name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: microservices-cluster

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8
        run: |
          flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run black
        run: black --check services/

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Test API Gateway
        run: |
          cd services/api-gateway
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test Order Service
        run: |
          cd services/order-service
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test Inventory Service
        run: |
          cd services/inventory-service
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test Notification Service
        run: |
          cd services/notification-service
          pip install -r requirements.txt
          pytest tests/ -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build API Gateway
        run: |
          docker build -t api-gateway:${{ github.sha }} ./services/api-gateway

      - name: Build Order Service
        run: |
          docker build -t order-service:${{ github.sha }} ./services/order-service

      - name: Build Inventory Service
        run: |
          docker build -t inventory-service:${{ github.sha }} ./services/inventory-service

      - name: Build Notification Service
        run: |
          docker build -t notification-service:${{ github.sha }} ./services/notification-service

  push:
    name: Push to Registry
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/api-gateway:$IMAGE_TAG ./services/api-gateway
          docker push $ECR_REGISTRY/api-gateway:$IMAGE_TAG
          
          docker build -t $ECR_REGISTRY/order-service:$IMAGE_TAG ./services/order-service
          docker push $ECR_REGISTRY/order-service:$IMAGE_TAG
          
          docker build -t $ECR_REGISTRY/inventory-service:$IMAGE_TAG ./services/inventory-service
          docker push $ECR_REGISTRY/inventory-service:$IMAGE_TAG
          
          docker build -t $ECR_REGISTRY/notification-service:$IMAGE_TAG ./services/notification-service
          docker push $ECR_REGISTRY/notification-service:$IMAGE_TAG

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl apply -f kubernetes/base/
          kubectl apply -f kubernetes/configmaps/
          kubectl apply -f kubernetes/secrets/
          kubectl apply -f kubernetes/deployments/
          kubectl apply -f kubernetes/services/
          kubectl apply -f kubernetes/ingress/
          
          kubectl set image deployment/api-gateway api-gateway=${{ steps.login-ecr.outputs.registry }}/api-gateway:$IMAGE_TAG -n microservices
          kubectl set image deployment/order-service order-service=${{ steps.login-ecr.outputs.registry }}/order-service:$IMAGE_TAG -n microservices
          kubectl set image deployment/inventory-service inventory-service=${{ steps.login-ecr.outputs.registry }}/inventory-service:$IMAGE_TAG -n microservices
          kubectl set image deployment/notification-service notification-service=${{ steps.login-ecr.outputs.registry }}/notification-service:$IMAGE_TAG -n microservices

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n microservices
          kubectl rollout status deployment/order-service -n microservices
          kubectl rollout status deployment/inventory-service -n microservices
          kubectl rollout status deployment/notification-service -n microservices
